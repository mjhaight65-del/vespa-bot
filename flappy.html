<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Flappy PD — Beat the Parlay</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      background: #0b1020;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      overflow: hidden;
      user-select: none;
      -webkit-user-select: none;
    }
    #wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    canvas {
      display: block;
      background: linear-gradient(#4ec0ca 0%, #6bdcd0 60%, #ded895 100%);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);
      border-radius: 8px;
      max-width: 100vw;
      max-height: 100vh;
      touch-action: none;
    }
    #hud {
      position: fixed;
      top: 14px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 28px;
      font-weight: 800;
      text-shadow: 2px 2px 0 #000, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000;
      letter-spacing: 1px;
      pointer-events: none;
    }
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(4px);
      z-index: 10;
      text-align: center;
      padding: 20px;
    }
    #overlay.hidden { display: none; }
    #overlay h1 {
      margin: 0 0 6px;
      font-size: 44px;
      letter-spacing: 2px;
      color: #ffd84d;
      text-shadow: 3px 3px 0 #000;
    }
    #overlay p {
      margin: 6px 0;
      font-size: 18px;
      opacity: 0.9;
    }
    #overlay .scoreline {
      font-size: 22px;
      color: #fff;
      margin-top: 14px;
    }
    #overlay .best {
      color: #ffd84d;
      font-weight: 700;
    }
    button.play {
      margin-top: 22px;
      padding: 14px 30px;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 1px;
      background: linear-gradient(#ffd84d, #ff9f1c);
      color: #2a1a00;
      border: 3px solid #000;
      border-radius: 10px;
      cursor: pointer;
      box-shadow: 0 6px 0 #000;
      transition: transform 0.05s, box-shadow 0.05s;
    }
    button.play:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #000;
    }
    .hint {
      margin-top: 16px;
      font-size: 13px;
      opacity: 0.7;
    }
    .pd-preview {
      width: 72px;
      height: 72px;
      margin-bottom: 10px;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #fff, #d9d9d9 60%, #8a8a8a);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #c00;
      font-weight: 900;
      font-size: 30px;
      font-family: "Arial Black", Impact, sans-serif;
      letter-spacing: -2px;
      border: 3px solid #000;
      box-shadow: 0 6px 0 #000;
    }
  </style>
</head>
<body>
  <div id="wrap">
    <canvas id="game" width="420" height="640"></canvas>
  </div>
  <div id="hud"></div>

  <div id="overlay">
    <div class="pd-preview">PD</div>
    <h1>FLAPPY PD</h1>
    <p>Dodge the parlay legs. Cash the ticket.</p>
    <div class="scoreline" id="overScore"></div>
    <button class="play" id="playBtn">TAP TO PLAY</button>
    <div class="hint">Space / Click / Tap to flap</div>
  </div>

<script>
(function () {
  const canvas = document.getElementById('game');
  const ctx = canvas.getContext('2d');
  const hud = document.getElementById('hud');
  const overlay = document.getElementById('overlay');
  const overScore = document.getElementById('overScore');
  const playBtn = document.getElementById('playBtn');

  const W = canvas.width;
  const H = canvas.height;

  const BET_TERMS = [
    'LAST LEG',
    '10-LEG PARLAY',
    'NRFI',
    '1ST TD SCORER',
    '1ST BASKET',
    'FUTURE BET'
  ];

  const state = {
    mode: 'menu',
    bird: { x: 110, y: H / 2, vy: 0, r: 20, rot: 0 },
    pipes: [],
    ground: 0,
    score: 0,
    best: Number(localStorage.getItem('flappyPdBest') || 0),
    frame: 0,
    framesSinceSpawn: 0,
    pipeW: 78,
    gravity: 0.32,
    flap: -6.3
  };

  function difficulty() {
    const t = Math.min(1, state.score / 25);
    const speed = 1.5 + 1.8 * t;
    const gap = 235 - 85 * t;
    const pipeDistance = 290 - 40 * t;
    const spawnEvery = Math.max(40, Math.round(pipeDistance / speed));
    return { speed, gap, spawnEvery };
  }

  function resetGame() {
    state.bird.x = 110;
    state.bird.y = H / 2;
    state.bird.vy = 0;
    state.bird.rot = 0;
    state.pipes.length = 0;
    state.ground = 0;
    state.score = 0;
    state.frame = 0;
    state.framesSinceSpawn = 0;
  }

  function startGame() {
    resetGame();
    state.mode = 'play';
    overlay.classList.add('hidden');
    hud.textContent = '0';
  }

  function gameOver() {
    state.mode = 'over';
    if (state.score > state.best) {
      state.best = state.score;
      localStorage.setItem('flappyPdBest', String(state.best));
    }
    overlay.classList.remove('hidden');
    overScore.innerHTML =
      'Score: <b>' + state.score + '</b> &nbsp; | &nbsp; ' +
      '<span class="best">Best: ' + state.best + '</span>';
    playBtn.textContent = 'PLAY AGAIN';
    hud.textContent = '';
  }

  function flap() {
    if (state.mode === 'menu' || state.mode === 'over') {
      startGame();
      state.bird.vy = state.flap;
      return;
    }
    if (state.mode === 'play') {
      state.bird.vy = state.flap;
    }
  }

  function spawnPipe(gap) {
    const minTop = 60;
    const maxTop = H - gap - 140;
    const topH = Math.floor(minTop + Math.random() * (maxTop - minTop));
    const term = BET_TERMS[Math.floor(Math.random() * BET_TERMS.length)];
    state.pipes.push({
      x: W + 10,
      topH: topH,
      gap: gap,
      passed: false,
      term: term
    });
  }

  function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + aw > by &&
           ay < by + bh && ay + ah > by;
  }

  function circleRectCollide(cx, cy, cr, rx, ry, rw, rh) {
    const nx = Math.max(rx, Math.min(cx, rx + rw));
    const ny = Math.max(ry, Math.min(cy, ry + rh));
    const dx = cx - nx;
    const dy = cy - ny;
    return (dx * dx + dy * dy) < (cr * cr);
  }

  function update() {
    const d = difficulty();
    if (state.mode !== 'play') {
      state.ground = (state.ground + d.speed) % 48;
      return;
    }

    state.frame++;
    state.bird.vy += state.gravity;
    if (state.bird.vy > 9) state.bird.vy = 9;
    state.bird.y += state.bird.vy;
    state.bird.rot = Math.max(-0.5, Math.min(1.2, state.bird.vy / 12));

    state.framesSinceSpawn++;
    if (state.framesSinceSpawn >= d.spawnEvery) {
      state.framesSinceSpawn = 0;
      spawnPipe(d.gap);
    }

    const groundY = H - 90;

    for (let i = state.pipes.length - 1; i >= 0; i--) {
      const p = state.pipes[i];
      p.x -= d.speed;

      const bx = state.bird.x;
      const by = state.bird.y;
      const br = state.bird.r;

      const topRect = { x: p.x, y: 0, w: state.pipeW, h: p.topH };
      const botRect = {
        x: p.x,
        y: p.topH + p.gap,
        w: state.pipeW,
        h: H - (p.topH + p.gap)
      };

      if (
        circleRectCollide(bx, by, br, topRect.x, topRect.y, topRect.w, topRect.h) ||
        circleRectCollide(bx, by, br, botRect.x, botRect.y, botRect.w, botRect.h)
      ) {
        return gameOver();
      }

      if (!p.passed && p.x + state.pipeW < state.bird.x) {
        p.passed = true;
        state.score++;
        hud.textContent = String(state.score);
      }

      if (p.x + state.pipeW < -20) state.pipes.splice(i, 1);
    }

    if (state.bird.y + state.bird.r >= groundY) {
      state.bird.y = groundY - state.bird.r;
      return gameOver();
    }
    if (state.bird.y - state.bird.r < 0) {
      state.bird.y = state.bird.r;
      state.bird.vy = 0;
    }

    state.ground = (state.ground + d.speed) % 48;
  }

  function drawBackground() {
    const g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, '#4ec0ca');
    g.addColorStop(0.6, '#6bdcd0');
    g.addColorStop(1, '#ded895');
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = 'rgba(255,255,255,0.55)';
    const clouds = [
      { x: 60, y: 90, r: 22 },
      { x: 110, y: 80, r: 28 },
      { x: 160, y: 95, r: 20 },
      { x: 300, y: 140, r: 24 },
      { x: 340, y: 130, r: 30 }
    ];
    for (const c of clouds) {
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
      ctx.fill();
    }

    ctx.fillStyle = '#5a9a3d';
    ctx.beginPath();
    ctx.moveTo(0, H - 150);
    for (let x = 0; x <= W; x += 40) {
      ctx.lineTo(x, H - 150 - (x % 80 === 0 ? 22 : 10));
    }
    ctx.lineTo(W, H - 90);
    ctx.lineTo(0, H - 90);
    ctx.closePath();
    ctx.fill();
  }

  function drawPipe(p) {
    const capH = 28;
    const capOver = 6;

    const drawBody = (y, h) => {
      const grad = ctx.createLinearGradient(p.x, 0, p.x + state.pipeW, 0);
      grad.addColorStop(0, '#4fbb2a');
      grad.addColorStop(0.2, '#8cde5a');
      grad.addColorStop(0.5, '#c8f296');
      grad.addColorStop(0.8, '#7bcd46');
      grad.addColorStop(1, '#3a8a1f');
      ctx.fillStyle = grad;
      ctx.fillRect(p.x, y, state.pipeW, h);
      ctx.strokeStyle = '#2a5e13';
      ctx.lineWidth = 2;
      ctx.strokeRect(p.x + 0.5, y + 0.5, state.pipeW - 1, h - 1);
    };

    const drawCap = (y) => {
      const cx = p.x - capOver;
      const cw = state.pipeW + capOver * 2;
      const grad = ctx.createLinearGradient(cx, 0, cx + cw, 0);
      grad.addColorStop(0, '#4fbb2a');
      grad.addColorStop(0.2, '#9ee662');
      grad.addColorStop(0.5, '#d6f7a6');
      grad.addColorStop(0.8, '#82d24c');
      grad.addColorStop(1, '#3a8a1f');
      ctx.fillStyle = grad;
      ctx.fillRect(cx, y, cw, capH);
      ctx.strokeStyle = '#2a5e13';
      ctx.lineWidth = 2;
      ctx.strokeRect(cx + 0.5, y + 0.5, cw - 1, capH - 1);
    };

    drawBody(0, p.topH - capH);
    drawCap(p.topH - capH);

    const botY = p.topH + p.gap;
    drawCap(botY);
    drawBody(botY + capH, H - (botY + capH) - 90);

    drawTermLabel(p, p.topH - capH - 60, p.term, true);
    drawTermLabel(p, botY + capH + 14, p.term, false);
  }

  function drawTermLabel(p, y, term, isTop) {
    const w = state.pipeW - 12;
    const h = 46;
    const x = p.x + 6;

    ctx.save();
    ctx.fillStyle = '#fff8dc';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 2;
    roundRect(ctx, x, y, w, h, 6);
    ctx.fill();
    ctx.stroke();

    ctx.fillStyle = '#c0392b';
    ctx.font = '900 10px "Arial Black", Impact, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const cx = x + w / 2;
    const cy = y + h / 2;
    const words = term.split(' ');
    if (words.length === 1) {
      ctx.fillText(term, cx, cy);
    } else if (words.length === 2) {
      ctx.fillText(words[0], cx, cy - 8);
      ctx.fillText(words[1], cx, cy + 8);
    } else {
      ctx.fillText(words[0], cx, cy - 12);
      ctx.fillText(words[1], cx, cy);
      ctx.fillText(words.slice(2).join(' '), cx, cy + 12);
    }
    ctx.restore();
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.lineTo(x + w - r, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + r);
    ctx.lineTo(x + w, y + h - r);
    ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
    ctx.lineTo(x + r, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - r);
    ctx.lineTo(x, y + r);
    ctx.quadraticCurveTo(x, y, x + r, y);
    ctx.closePath();
  }

  function drawGround() {
    const gy = H - 90;
    ctx.fillStyle = '#ded895';
    ctx.fillRect(0, gy, W, 90);

    ctx.fillStyle = '#b8a94a';
    for (let x = -state.ground; x < W; x += 24) {
      ctx.fillRect(x, gy + 8, 14, 6);
      ctx.fillRect(x + 6, gy + 26, 14, 6);
    }

    ctx.fillStyle = '#8a6d2b';
    ctx.fillRect(0, gy + 44, W, 46);
    ctx.fillStyle = '#6d5620';
    for (let x = -state.ground; x < W; x += 16) {
      ctx.fillRect(x, gy + 44, 8, 46);
    }
  }

  function drawBird() {
    const { x, y, rot } = state.bird;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(rot);

    const r = state.bird.r + 2;

    const grad = ctx.createRadialGradient(-6, -6, 4, 0, 0, r);
    grad.addColorStop(0, '#ffffff');
    grad.addColorStop(0.55, '#e6e6e6');
    grad.addColorStop(1, '#8a8a8a');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fill();

    ctx.lineWidth = 2.5;
    ctx.strokeStyle = '#000';
    ctx.stroke();

    ctx.fillStyle = '#c0392b';
    ctx.font = '900 22px "Arial Black", Impact, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('PD', 0, 1);

    ctx.restore();
  }

  function render() {
    drawBackground();
    for (const p of state.pipes) drawPipe(p);
    drawGround();
    drawBird();

    if (state.mode === 'menu') {
      ctx.fillStyle = 'rgba(0,0,0,0.35)';
      ctx.fillRect(0, 0, W, H);
    }
  }

  function loop() {
    update();
    render();
    requestAnimationFrame(loop);
  }

  function onInput(e) {
    if (e) e.preventDefault();
    flap();
  }

  window.addEventListener('keydown', (e) => {
    if (e.code === 'Space' || e.code === 'ArrowUp' || e.code === 'KeyW') {
      onInput(e);
    }
  });
  canvas.addEventListener('mousedown', onInput);
  canvas.addEventListener('touchstart', onInput, { passive: false });
  playBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    startGame();
    state.bird.vy = state.flap;
  });

  function fitCanvas() {
    const ratio = W / H;
    const aw = window.innerWidth;
    const ah = window.innerHeight;
    let cw = aw, ch = aw / ratio;
    if (ch > ah) { ch = ah; cw = ah * ratio; }
    canvas.style.width = Math.floor(cw) + 'px';
    canvas.style.height = Math.floor(ch) + 'px';
  }
  window.addEventListener('resize', fitCanvas);
  fitCanvas();

  loop();
})();
</script>
</body>
</html>
